# -- Markup --
# These settings are required for the theme to function.

[goldmark]
[goldmark.extensions]
  [goldmark.extensions.passthrough]
    enable = true
    [goldmark.extensions.passthrough.delimiters]
      block = [['$$', '$$'], ['\\[', '\\]']]
      inline = [['\\(', '\\)']]
[goldmark.renderer]
  unsafe = true

[highlight]
  noClasses = false

[tableOfContents]
  startLevel = 1
  endLevel = 4
